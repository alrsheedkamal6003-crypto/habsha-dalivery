<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هبشة | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #f5b921; 
            --secondary: #00c6ff; 
            --dark: #2d3436;
            --light: #f9f9f9;
            --success: #00b894;
            --danger: #d63031;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f0f2f5;
            background: linear-gradient(-45deg, #f0f2f5, #e1e8ed, #ffffff, #f5b92115);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--dark);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-shape {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
        }
        .shape1 {
            width: 350px; height: 350px;
            background: rgba(245, 185, 33, 0.35);
            top: -50px; right: -50px;
            animation: float 8s infinite ease-in-out alternate, pulseShape 12s infinite;
        }
        .shape2 {
            width: 300px; height: 300px;
            background: rgba(0, 198, 255, 0.25);
            bottom: -50px; left: -50px;
            animation-delay: -5s;
            animation: float 12s infinite ease-in-out alternate-reverse, pulseShape 15s infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1) rotate(0deg); }
            100% { transform: translateY(30px) scale(1.1) rotate(10deg); }
        }
        @keyframes pulseShape {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .login-container {
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            box-shadow: var(--glass-shadow);
            border-radius: 30px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 1s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            z-index: 2;
        }
        .login-container:hover {
            box-shadow: 0 15px 45px 0 rgba(31, 38, 135, 0.25);
            transform: translateY(-5px) scale(1.01) !important;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px; 
        }

        .brand-image {
            width: 100px;
            height: 100px;
            border-radius: 25px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: block;
            margin: 0 auto 15px auto; 
            border: 3px solid white;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .brand-image:hover {
            transform: rotate(360deg) scale(1.15);
            box-shadow: 0 15px 25px rgba(245, 185, 33, 0.4);
            border-color: var(--primary);
        }

        .brand-title {
            font-size: 32px; 
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
            background: linear-gradient(45deg, var(--dark), var(--primary), var(--secondary), var(--primary));
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 3s infinite linear, bounceTitle 2s ease-in-out infinite alternate;
        }
        
        .brand-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 4px;
            background: var(--primary);
            border-radius: 10px;
            animation: expandLine 2s ease-in-out infinite alternate;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }
        
        @keyframes bounceTitle {
            0% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 2px rgba(245, 185, 33, 0.2)); }
            100% { transform: translateY(-5px) scale(1.05); filter: drop-shadow(0 5px 15px rgba(245, 185, 33, 0.6)); }
        }

        @keyframes expandLine {
            0% { width: 20px; opacity: 0.5; box-shadow: 0 0 0px var(--primary); }
            100% { width: 80px; opacity: 1; box-shadow: 0 0 10px var(--primary); }
        }

        .subtitle {
            color: #636e72;
            font-size: 14px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--dark);
            transition: all 0.3s ease;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.main-icon {
            position: absolute;
            right: 15px;
            color: #b2bec3;
            font-size: 18px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .form-control {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border: 2px solid #dfe6e9;
            border-radius: 15px;
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            background: rgba(255, 255, 255, 0.9);
            color: var(--dark);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(245, 185, 33, 0.15), 0 5px 15px rgba(0,0,0,0.05);
            background: #fff;
            transform: translateY(-2px);
        }

        .form-control:focus + i.main-icon {
            color: var(--primary);
            transform: scale(1.2) rotate(10deg);
        }

        .form-group:focus-within label {
            color: var(--primary);
            transform: translateX(-5px);
        }

        .toggle-password {
            position: absolute;
            left: 15px;
            color: #b2bec3;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: none;
            background: none;
            outline: none;
        }
        .toggle-password:hover {
            color: var(--primary);
            transform: scale(1.2);
        }
        
        .input-password {
            padding-left: 45px;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
            font-weight: 600;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #636e72;
            transition: color 0.3s;
        }
        .remember-me:hover {
            color: var(--dark);
        }

        .remember-me input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid #b2bec3;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .remember-me input[type="checkbox"]:checked {
            background-color: var(--primary);
            border-color: var(--primary);
            transform: scale(1.1);
        }
        .remember-me input[type="checkbox"]:checked::after {
            content: '\f00c';
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            color: white;
            font-size: 10px;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: checkmarkIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes checkmarkIn {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .forgot-password::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            right: 0;
            background-color: #d35400;
            transition: width 0.3s ease;
        }
        .forgot-password:hover {
            color: #d35400;
        }
        .forgot-password:hover::after {
            width: 100%;
            left: 0;
            right: auto;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary) 0%, #e1a00a 50%, #f1c40f 100%);
            background-size: 200% auto;
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(245, 185, 33, 0.4);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .btn-login::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease-out, height 0.6s ease-out;
            z-index: -1;
        }
        .btn-login:hover::after, .btn-login:active::after {
            width: 300px;
            height: 300px;
        }

        .btn-login:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(245, 185, 33, 0.6);
            background-position: right center;
            animation: pulseBtnGlow 1.5s infinite alternate;
        }
        .btn-login:active {
            transform: translateY(1px);
            box-shadow: 0 5px 10px rgba(245, 185, 33, 0.4);
        }

        @keyframes pulseBtnGlow {
            0% { box-shadow: 0 5px 15px rgba(245, 185, 33, 0.4); }
            100% { box-shadow: 0 10px 30px rgba(245, 185, 33, 0.8); }
        }

        .btn-login:hover i {
            animation: slideIcon 0.5s ease forwards;
        }
        @keyframes slideIcon {
            0% { transform: translateX(0); }
            50% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        /* ================= إضافات حقوق النشر المدهشة (تم المعالجة) ================= */
        .copyright-container {
            position: fixed; /* التعديل هنا لضمان الظهور دائماً أسفل الشاشة */
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 100%;
            z-index: 1000; /* التعديل هنا لجعله فوق كل العناصر */
            animation: floatCopyright 4s ease-in-out infinite;
        }

        .copyright-text {
            font-size: 14px;
            font-weight: 700;
            color: #636e72;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 8px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            display: inline-block;
        }

        .app-name-copy {
            background: linear-gradient(90deg, var(--primary), #d35400, var(--secondary), var(--primary));
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            font-size: 15px;
            margin: 0 3px;
            animation: shineText 3s infinite linear, pulseScale 2s infinite alternate;
            display: inline-block;
        }

        @keyframes floatCopyright {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -8px); }
        }

        @keyframes pulseScale {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(245, 185, 33, 0)); }
            100% { transform: scale(1.05); filter: drop-shadow(0 0 8px rgba(245, 185, 33, 0.6)); }
        }
        /* ========================================================= */

    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="login-container">
        <div class="login-header">
            <img src="WhatsApp%20Image%202026-05-28%20at%201.31.00%20PM.jpeg" alt="Delivery" class="brand-image">
            <h1 class="brand-title"> هبشة | HABSHA</h1>
            <p class="subtitle">بوابة دخول الكباتن والموظفين</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            
            <div class="form-group">
                <label>رقم الهاتف</label>
                <div class="input-wrapper">
                    <input type="tel" class="form-control" id="phoneNumber" placeholder="أدخل رقم الهاتف" dir="ltr" style="text-align: right;" required>
                    <i class="fas fa-phone-alt main-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" class="form-control input-password" id="password" placeholder="أدخل كلمة المرور" required>
                    <i class="fas fa-lock main-icon"></i>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe" checked>
                    تذكرني
                </label>
                <a href="#" class="forgot-password">نسيت كلمة المرور؟</a>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                دخول <i class="fas fa-sign-in-alt"></i>
            </button>

        </form>
    </div>

    <!-- قسم حقوق النشر المضاف (تم المعالجة) -->
    <div class="copyright-container">
        <div class="copyright-text">
            &copy; 2026 جميع الحقوق محفوظة لـ <span class="app-name-copy">هبشة  | HABSHA</span>
        </div>
    </div>

    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        function handleLogin(event) {
            event.preventDefault(); 
            
            const phone = document.getElementById('phoneNumber').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const originalBtnText = loginBtn.innerHTML;

            loginBtn.innerHTML = 'جاري التحقق... <i class="fas fa-spinner fa-spin"></i>';
            loginBtn.style.opacity = "0.8";
            loginBtn.disabled = true;

            setTimeout(() => {
                
                const usersDatabase = {
                    "0127825456": { password: "0960", role: "admin", name: "الرشيد كمال" }, 
                    "0114675143": { password: "0000", role: "captain", name: "عثمان التجاني" }, 
                    "0964278052": { password: "1111", role: "captain", name: "نسيبة صلاح الدين" }, 
                    "0912345678": { password: "123", role: "captain", name: "محمد عادل علي يوسف" } 
                };

                if (phone && password) {
                    
                    if(usersDatabase[phone] && usersDatabase[phone].password === password) {
                        const user = usersDatabase[phone];
                        
                        localStorage.setItem('userRole', user.role);
                        localStorage.setItem('loggedCaptain', user.name);

                        if(user.role === 'admin') {
                            alert("تم تسجيل الدخول بنجاح!\nمرحباً بك يا أدمن، لديك التحكم الكامل.");
                        } else {
                            alert("تم تسجيل الدخول بنجاح!\nمرحباً بك كابتن " + user.name + ".");
                        }
                        
                        window.location.href = "habsha_display.html"; 
                    } else {
                        alert("عذراً، رقم الهاتف أو كلمة المرور غير صحيحة!");
                    }
                    
                } else {
                    alert("الرجاء التأكد من رقم الهاتف وكلمة المرور.");
                }

                loginBtn.innerHTML = originalBtnText;
                loginBtn.style.opacity = "1";
                loginBtn.disabled = false;
                
            }, 1500);
        }
    </script>
</body>
</html>
