<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هبشة | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #f5b921; 
            --secondary: #00c6ff; 
            --dark: #2d3436;
            --light: #f9f9f9;
            --success: #00b894;
            --danger: #d63031;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f0f2f5;
            color: var(--dark);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* رسومات متحركة في الخلفية */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            animation: float 10s infinite ease-in-out alternate;
        }
        .shape1 {
            width: 350px; height: 350px;
            background: rgba(245, 185, 33, 0.35);
            top: -50px; right: -50px;
        }
        .shape2 {
            width: 300px; height: 300px;
            background: rgba(0, 198, 255, 0.25);
            bottom: -50px; left: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        /* حاوية تسجيل الدخول (التصميم الزجاجي) */
        .login-container {
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            box-shadow: var(--glass-shadow);
            border-radius: 30px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        /* الهيدر والشعار */
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-image {
            width: 100px;
            height: 100px;
            border-radius: 25px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            border: 3px solid white;
        }

        .brand-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--dark);
            margin-bottom: 5px;
        }

        .subtitle {
            color: #636e72;
            font-size: 14px;
            font-weight: 600;
        }

        /* الحقول والنماذج */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--dark);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.main-icon {
            position: absolute;
            right: 15px;
            color: #b2bec3;
            font-size: 18px;
            transition: color 0.3s;
        }

        .form-control {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border: 2px solid #dfe6e9;
            border-radius: 15px;
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            background: rgba(255, 255, 255, 0.9);
            color: var(--dark);
            transition: all 0.3s;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(245, 185, 33, 0.1);
            background: #fff;
        }

        .form-control:focus + i.main-icon {
            color: var(--primary);
        }

        /* زر إظهار/إخفاء كلمة المرور */
        .toggle-password {
            position: absolute;
            left: 15px;
            color: #b2bec3;
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s;
            border: none;
            background: none;
            outline: none;
        }
        .toggle-password:hover {
            color: var(--dark);
        }
        /* ترك مساحة لزر العين في حقل كلمة المرور */
        .input-password {
            padding-left: 45px;
        }

        /* خيارات تذكرني ونسيت كلمة المرور */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
            font-weight: 600;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #636e72;
        }

        .remember-me input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid #b2bec3;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        .remember-me input[type="checkbox"]:checked {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .remember-me input[type="checkbox"]:checked::after {
            content: '\f00c';
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            color: white;
            font-size: 10px;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.3s;
        }
        .forgot-password:hover {
            color: #d35400;
            text-decoration: underline;
        }

        /* زر تسجيل الدخول */
        .btn-login {
            background: linear-gradient(135deg, var(--primary) 0%, #e1a00a 100%);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(245, 185, 33, 0.4);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-login:hover, .btn-login:active {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(245, 185, 33, 0.6);
        }

    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="login-container">
        <div class="login-header">
            <img src="WhatsApp%20Image%202026-05-28%20at%201.31.00%20PM.jpeg" alt="Delivery" class="brand-image">
            <h1 class="brand-title">HABSHA | هَبْشَة</h1>
            <p class="subtitle">بوابة دخول الكباتن والموظفين</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            
            <div class="form-group">
                <label>رقم الهاتف</label>
                <div class="input-wrapper">
                    <input type="tel" class="form-control" id="phoneNumber" placeholder="أدخل رقم الهاتف" dir="ltr" style="text-align: right;" required>
                    <i class="fas fa-phone-alt main-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" class="form-control input-password" id="password" placeholder="أدخل كلمة المرور" required>
                    <i class="fas fa-lock main-icon"></i>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe" checked>
                    تذكرني
                </label>
                <a href="#" class="forgot-password">نسيت كلمة المرور؟</a>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                دخول <i class="fas fa-sign-in-alt"></i>
            </button>

        </form>
    </div>

    <script>
        // دالة لإظهار وإخفاء كلمة المرور
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        // دالة التعامل مع حدث تسجيل الدخول
        function handleLogin(event) {
            event.preventDefault(); // منع إعادة تحميل الصفحة الافتراضي
            
            const phone = document.getElementById('phoneNumber').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const originalBtnText = loginBtn.innerHTML;

            // تغيير شكل الزر لإظهار حالة التحميل
            loginBtn.innerHTML = 'جاري التحقق... <i class="fas fa-spinner fa-spin"></i>';
            loginBtn.style.opacity = "0.8";
            loginBtn.disabled = true;

            // محاكاة الاتصال بقاعدة البيانات للتحقق (تأخير زمني بسيط)
            setTimeout(() => {
                
                // --- قاعدة بيانات محلية لتحديد الصلاحيات (أدمن / كابتن) ---
                const usersDatabase = {
                    "0127825456": { password: "0960", role: "admin", name: "الرشيد كمال" }, // حساب الأدمن
                    "0114675143": { password: "0000", role: "captain", name: "عثمان التجاني" }, // الكابتن الأول
                    "0964278052": { password: "1111", role: "captain", name: "نسيبة صلاح الدين" }, // الكابتن الثاني
                    "0912345678": { password: "123", role: "captain", name: "محمد عادل علي يوسف" } // القاعدة الذهبية (كابتن)
                };

                // في الخطوة القادمة سيتم ربط هذا الجزء بـ Firebase Authentication
                if (phone && password) {
                    
                    if(usersDatabase[phone] && usersDatabase[phone].password === password) {
                        const user = usersDatabase[phone];
                        
                        // حفظ دور المستخدم واسمه في الذاكرة لتستخدمه شاشة العرض
                        localStorage.setItem('userRole', user.role);
                        localStorage.setItem('loggedCaptain', user.name);

                        if(user.role === 'admin') {
                            alert("تم تسجيل الدخول بنجاح!\nمرحباً بك يا أدمن، لديك التحكم الكامل.");
                        } else {
                            alert("تم تسجيل الدخول بنجاح!\nمرحباً بك كابتن " + user.name + ".");
                        }
                        
                        // تحويل المستخدم لشاشة العرض الرئيسية بالاسم الجديد
                        window.location.href = "habsha_display.html"; 
                    } else {
                        alert("عذراً، رقم الهاتف أو كلمة المرور غير صحيحة!");
                    }
                    
                } else {
                    alert("الرجاء التأكد من رقم الهاتف وكلمة المرور.");
                }

                // إرجاع الزر لشكله الطبيعي
                loginBtn.innerHTML = originalBtnText;
                loginBtn.style.opacity = "1";
                loginBtn.disabled = false;
                
            }, 1500);
        }
    </script>
</body>
</html>
